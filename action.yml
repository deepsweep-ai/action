name: 'DeepSweep Security'
description: 'Validate AI coding assistant configurations for security issues'
author: 'DeepSweep'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to validate (default: current directory)'
    required: false
    default: '.'

  fail-on:
    description: 'Minimum severity to fail the check (critical, high, medium, low, none)'
    required: false
    default: 'high'

  upload-sarif:
    description: 'Upload SARIF results to GitHub Security tab'
    required: false
    default: 'true'

  comment-on-pr:
    description: 'Post validation results as PR comment'
    required: false
    default: 'true'

  version:
    description: 'DeepSweep CLI version to install'
    required: false
    default: 'latest'

outputs:
  score:
    description: 'Security score (0-100)'

  grade:
    description: 'Security grade (A-F)'

  findings-count:
    description: 'Total number of findings'

  critical-count:
    description: 'Number of critical findings'

  sarif-file:
    description: 'Path to generated SARIF file'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install DeepSweep
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          pip install deepsweep-ai
        else
          pip install deepsweep-ai==${{ inputs.version }}
        fi

    - name: Run validation
      id: validate
      shell: bash
      run: |
        # Run validation and capture output
        set +e
        OUTPUT=$(deepsweep validate "${{ inputs.path }}" --format json 2>&1)
        EXIT_CODE=$?
        set -e

        # Parse JSON output
        SCORE=$(echo "$OUTPUT" | jq -r '.score // 0')
        GRADE=$(echo "$OUTPUT" | jq -r '.grade // "F"')
        FINDINGS=$(echo "$OUTPUT" | jq -r '.findings_count // 0')
        CRITICAL=$(echo "$OUTPUT" | jq -r '.findings | map(select(.severity == "critical")) | length // 0')

        # Set outputs
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "findings-count=$FINDINGS" >> $GITHUB_OUTPUT
        echo "critical-count=$CRITICAL" >> $GITHUB_OUTPUT

        # Save full output for later steps
        echo "$OUTPUT" > /tmp/deepsweep-results.json

    - name: Generate SARIF
      if: inputs.upload-sarif == 'true'
      shell: bash
      run: |
        deepsweep validate "${{ inputs.path }}" --format sarif > deepsweep-results.sarif
        echo "sarif-file=deepsweep-results.sarif" >> $GITHUB_OUTPUT

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: deepsweep-results.sarif
        category: deepsweep

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('/tmp/deepsweep-results.json', 'utf8'));

          let statusIcon = '[PASS]';
          if (results.findings.some(f => f.severity === 'critical')) {
            statusIcon = '[FAIL]';
          } else if (results.findings.some(f => f.severity === 'high' || f.severity === 'medium')) {
            statusIcon = '[WARN]';
          }

          let body = `## DeepSweep Security Validation\n\n`;
          body += `${statusIcon} **Score: ${results.score}/100 (Grade: ${results.grade})**\n\n`;

          if (results.findings.length === 0) {
            body += `No issues found. Your AI assistant configurations look good!\n`;
          } else {
            body += `### ${results.findings.length} item(s) to review\n\n`;
            body += `| Severity | File | Issue |\n`;
            body += `|----------|------|-------|\n`;

            for (const finding of results.findings.slice(0, 10)) {
              const sev = finding.severity.toUpperCase();
              body += `| ${sev} | \`${finding.file}:${finding.line}\` | ${finding.message} |\n`;
            }

            if (results.findings.length > 10) {
              body += `\n*...and ${results.findings.length - 10} more. See the Security tab for full details.*\n`;
            }
          }

          body += `\n---\n`;
          body += `*Validated by [DeepSweep](https://deepsweep.ai) - You don't need to understand the code to secure it.*`;

          // Find existing comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existingComment = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('DeepSweep Security Validation')
          );

          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }

    - name: Check threshold
      shell: bash
      run: |
        FAIL_ON="${{ inputs.fail-on }}"
        RESULTS=$(cat /tmp/deepsweep-results.json)

        # Map severity to numeric value
        severity_value() {
          case $1 in
            critical) echo 4 ;;
            high) echo 3 ;;
            medium) echo 2 ;;
            low) echo 1 ;;
            *) echo 0 ;;
          esac
        }

        THRESHOLD=$(severity_value "$FAIL_ON")

        # Check if any finding exceeds threshold
        FAIL=0
        for severity in critical high medium low; do
          COUNT=$(echo "$RESULTS" | jq -r ".findings | map(select(.severity == \"$severity\")) | length")
          SEV_VALUE=$(severity_value "$severity")

          if [ "$COUNT" -gt 0 ] && [ "$SEV_VALUE" -ge "$THRESHOLD" ]; then
            echo "[FAIL] Found $COUNT $severity item(s) to review"
            FAIL=1
          fi
        done

        if [ "$FAIL" -eq 1 ]; then
          echo ""
          echo "Validation failed. Review items above and address them."
          echo "See the Security tab for details and remediation guidance."
          exit 1
        fi

        echo "[PASS] No items at or above '$FAIL_ON' severity"
